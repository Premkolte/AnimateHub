name: Add Contributor

on:
  pull_request:
    types: [closed]

permissions:
  contents: write

jobs:
  add-contributor:
    if: ${{ github.event.pull_request.merged == true && github.event.pull_request.user.login != 'Copilot' && github.event.pull_request.user.login != 'github-actions[bot]' }}
    runs-on: ubuntu-latest

    steps:
      # Checkout the repo
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          persist-credentials: false  # Disable default credentials for security

      # Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      # Install all-contributors-cli
      - name: Install all-contributors-cli
        run: npm install --global all-contributors-cli

      # Configure Git
      - name: Configure Git
        run: |
          git config --global user.name "Premkolte"
          git config --global user.email "premkolte26@gmail.com"

      # Add Contributor (only if username is valid and not a known bot)
      - name: Add Contributor
        run: npx all-contributors add "${{ github.event.pull_request.user.login }}" code

      # Generate README
      - name: Generate README
        run: npx all-contributors generate

      # Commit changes
      - name: Commit changes
        run: |
          git add README.md .all-contributorsrc
          git commit -m "docs: add ${{ github.event.pull_request.user.login }} as a contributor" || echo "No changes to commit"

      # Set up authentication for pushing changes
      - name: Set up authentication for pushing changes
        run: |
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}

      # Push changes
      - name: Push changes
        run: git push origin HEAD
